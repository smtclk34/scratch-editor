<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Scratch LMS Platform</title>

<style>
body{
margin:0;
display:flex;
height:100vh;
font-family:Arial;
}

/* SOL PANEL */
#left{
width:420px;
display:flex;
flex-direction:column;
border-right:1px solid #ddd;
background:#f8fafc;
}

/* LMS */
#lms{
flex:1;
border:none;
}

/* GÖREVLER */
#tasks{
height:40%;
overflow:auto;
padding:10px;
background:white;
border-top:1px solid #ddd;
}

.task{
background:#fff;
padding:10px;
margin-bottom:10px;
border-radius:8px;
cursor:pointer;
border:1px solid #ddd;
}

/* SAĞ EDITOR */
#editor{
flex:1;
border:none;
}
</style>

</head>

<body>

<!-- SOL -->
<div id="left">

<!-- TEK LMS iframe -->
<iframe
id="lms"
src="https://lms.bilisimgaraji.com/outProjects/newLMS/course-viewer.html?course=EDT-101&title=Etkile%C5%9Fimli%20Elektronik%20Devre%20Tasar%C4%B1m%C4%B1"
></iframe>

<!-- TEK GÖREV PANELİ -->
<div id="tasks">

<h3>🎯 Görevler</h3>

<div class="task" onclick="setTask('Kedi')">🐱 Kedi hareket ettir</div>
<div class="task" onclick="setTask('Uzay')">🚀 Uzay oyunu</div>
<div class="task" onclick="setTask('Pong')">🎮 Pong oyunu</div>

</div>

</div>

<!-- SAĞ SCRATCH -->
<iframe
id="editor"
src="https://scratch-editor-green.vercel.app"
></iframe>

<script>

function setTask(name){
alert("Seçilen görev: " + name);
}

</script>

</body>
</html>
