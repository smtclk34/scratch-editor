<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Scratch Eğitim Ortamı</title>

<script defer src="gui.js"></script>

<style>
html, body{
margin:0;
height:100%;
overflow:hidden;
}

/* SCRATCH */
#scratch-container{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
}

/* POPUP (BÜYÜTÜLDÜ) */
#eduPopup{
position:fixed;
top:20px;
right:20px;
width:380px;
height:520px;
background:white;
border:2px solid #4d97ff;
border-radius:12px;
z-index:99999;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
display:flex;
flex-direction:column;
overflow:hidden;
font-family:Arial;
}

/* HEADER (DRAG + BÜYÜK) */
#popupHeader{
background:#ffab19;
color:white;
padding:14px;
font-size:16px;
font-weight:bold;
cursor:move;
user-select:none;
}

/* CONTENT */
#popupContent{
flex:1;
padding:10px;
overflow:auto;
font-size:14px;
}

/* TASK TITLE */
.taskTitle{
background:#f1f5f9;
padding:10px;
margin-bottom:6px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
border:1px solid #ddd;
}

.taskTitle:hover{
background:#e2e8f0;
}

/* STEPS */
.steps{
display:none;
margin:8px 0 15px 0;
padding-left:10px;
}

.step{
display:flex;
align-items:center;
gap:8px;
margin-bottom:6px;
cursor:pointer;
}

.check{
width:18px;
text-align:center;
font-weight:bold;
}

/* COMPLETE BUTTON */
#completeBtn{
display:none;
margin-top:10px;
padding:10px;
background:#22c55e;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

#completeBtn:hover{
background:#16a34a;
}
</style>
</head>

<body>

<div id="scratch-container"></div>

<div id="eduPopup">

<div id="popupHeader">
🎯 Görev Paneli (Sürükle & Büyüt)
</div>

<div id="popupContent">

<!-- GÖREV 1 -->
<div class="taskTitle" onclick="toggleTask('t1')">🐱 Görev 1</div>
<div class="steps" id="t1">

<div class="step" onclick="toggleCheck(this)">
<span class="check">❌</span> Sprite ekle
</div>

<div class="step" onclick="toggleCheck(this)">
<span class="check">❌</span> move 10 steps kullan
</div>

<div class="step" onclick="toggleCheck(this)">
<span class="check">❌</span> Green flag ile çalıştır
</div>

</div>

<!-- GÖREV 2 -->
<div class="taskTitle" onclick="toggleTask('t2')">🚀 Görev 2</div>
<div class="steps" id="t2">

<div class="step" onclick="toggleCheck(this)">
<span class="check">❌</span> Ok tuşları ile hareket ettir
</div>

<div class="step" onclick="toggleCheck(this)">
<span class="check">❌</span> Engel ekle
</div>

</div>

<!-- GÖREV 3 -->
<div class="taskTitle" onclick="toggleTask('t3')">🎮 Görev 3</div>
<div class="steps" id="t3">

<div class="step" onclick="toggleCheck(this)">
<span class="check">❌</span> Top oluştur
</div>

<div class="step" onclick="toggleCheck(this)">
<span class="check">❌</span> Paddle ekle
</div>

</div>

<button id="completeBtn" onclick="finishTask()">
🎉 Görevi Tamamla
</button>

</div>
</div>

<script>

let openTasks = {t1:false,t2:false,t3:false};

/* TASK OPEN/CLOSE */
function toggleTask(id){
const el = document.getElementById(id);

if(el.style.display === "block"){
el.style.display = "none";
openTasks[id] = false;
}else{
el.style.display = "block";
openTasks[id] = true;
}
}

/* CHECK TOGGLE */
function toggleCheck(el){
const icon = el.querySelector(".check");

if(icon.innerText === "❌"){
icon.innerText = "✔";
icon.style.color = "green";
}else{
icon.innerText = "❌";
icon.style.color = "red";
}

checkAllDone();
}

/* ALL DONE CHECK */
function checkAllDone(){

const steps = document.querySelectorAll(".step");
let allDone = true;

steps.forEach(s=>{
if(s.querySelector(".check").innerText !== "✔"){
allDone = false;
}
});

document.getElementById("completeBtn").style.display =
allDone ? "block" : "none";
}

/* COMPLETE MESSAGE */
function finishTask(){
alert("🎉 Görev başarıyla tamamlandı! Projeni kaydet.");
}

/* DRAG */
const popup = document.getElementById("eduPopup");
const header = document.getElementById("popupHeader");

let offsetX=0, offsetY=0, dragging=false;

header.addEventListener("mousedown",(e)=>{
dragging=true;
offsetX=e.clientX-popup.offsetLeft;
offsetY=e.clientY-popup.offsetTop;
});

document.addEventListener("mousemove",(e)=>{
if(!dragging) return;

popup.style.left=(e.clientX-offsetX)+"px";
popup.style.top=(e.clientY-offsetY)+"px";
popup.style.right="auto";
});

document.addEventListener("mouseup",()=>{
dragging=false;
});

</script>

</body>
</html>
