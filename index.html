<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Scratch Eğitim Ortamı</title>

<script defer src="gui.js"></script>

<style>
html, body{
margin:0;
height:100%;
overflow:hidden;
}

/* SCRATCH */
#scratch-container{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
}

/* PANEL */
#eduPopup{
position:fixed;
top:20px;
right:20px;
width:380px;
height:520px;
background:white;
border:2px solid #4d97ff;
border-radius:12px;
z-index:99999;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
display:flex;
flex-direction:column;
overflow:hidden;
font-family:Arial;
transition:0.2s;
}

/* KÜÇÜK MOD */
#eduPopup.small{
height:60px;
}

/* HEADER */
#popupHeader{
background:#ffab19;
color:white;
padding:14px;
font-size:16px;
font-weight:bold;
cursor:move;
user-select:none;
}

/* CONTENT */
#popupContent{
flex:1;
padding:10px;
overflow:auto;
font-size:14px;
}

/* TASK TITLE */
.taskTitle{
background:#f1f5f9;
padding:10px;
margin-bottom:6px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
border:1px solid #ddd;
}

/* STEPS */
.steps{
display:none;
margin:8px 0;
padding-left:10px;
}

.step{
display:flex;
align-items:center;
gap:8px;
margin-bottom:6px;
cursor:pointer;
}

.check{
width:18px;
text-align:center;
font-weight:bold;
}

/* COMPLETE BUTTON */
.completeBtn{
display:none;
margin-top:10px;
padding:8px;
background:#22c55e;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
width:100%;
}

/* TOGGLE BTN */
#popupBtn{
position:fixed;
top:20px;
right:420px;
z-index:99999;
padding:10px 14px;
background:#ffab19;
color:white;
border:none;
border-radius:20px;
cursor:pointer;
font-weight:bold;
}
</style>
</head>

<body>

<div id="scratch-container"></div>

<button id="popupBtn" onclick="togglePopup()">
📘 Görev
</button>

<div id="eduPopup">

<div id="popupHeader" onclick="toggleSize()">
🎯 Görev Paneli (Tıkla Aç/Kapat)
</div>

<div id="popupContent">

<!-- GÖREV 1 -->
<div class="taskTitle" onclick="toggleTask('t1')">🐱 Görev 1</div>

<div class="steps" id="t1">

<div class="step" onclick="toggleCheck(this,'t1')">
<span class="check">❌</span> Sprite ekle
</div>

<div class="step" onclick="toggleCheck(this,'t1')">
<span class="check">❌</span> move 10 steps
</div>

<div class="step" onclick="toggleCheck(this,'t1')">
<span class="check">❌</span> Green flag ile çalıştır
</div>

<button class="completeBtn" id="btn-t1" onclick="finish('Görev 1')">
🎉 Görev 1 Tamamlandı
</button>

</div>

<!-- GÖREV 2 -->
<div class="taskTitle" onclick="toggleTask('t2')">🚀 Görev 2</div>

<div class="steps" id="t2">

<div class="step" onclick="toggleCheck(this,'t2')">
<span class="check">❌</span> Ok tuşları ile hareket
</div>

<div class="step" onclick="toggleCheck(this,'t2')">
<span class="check">❌</span> Engel ekle
</div>

<button class="completeBtn" id="btn-t2" onclick="finish('Görev 2')">
🎉 Görev 2 Tamamlandı
</button>

</div>

<!-- GÖREV 3 -->
<div class="taskTitle" onclick="toggleTask('t3')">🎮 Görev 3</div>

<div class="steps" id="t3">

<div class="step" onclick="toggleCheck(this,'t3')">
<span class="check">❌</span> Top oluştur
</div>

<div class="step" onclick="toggleCheck(this,'t3')">
<span class="check">❌</span> Paddle ekle
</div>

<button class="completeBtn" id="btn-t3" onclick="finish('Görev 3')">
🎉 Görev 3 Tamamlandı
</button>

</div>

</div>
</div>

<script>

let open = true;

/* POPUP SHOW/HIDE */
function togglePopup(){
const p=document.getElementById("eduPopup");
p.style.display = (p.style.display==="none")?"flex":"none";
}

/* SIZE TOGGLE */
function toggleSize(){
document.getElementById("eduPopup").classList.toggle("small");
}

/* TASK OPEN */
function toggleTask(id){
const el=document.getElementById(id);
el.style.display = (el.style.display==="block")?"none":"block";
}

/* CHECK */
function toggleCheck(el,taskId){

const icon = el.querySelector(".check");

if(icon.innerText==="❌"){
icon.innerText="✔";
icon.style.color="green";
}else{
icon.innerText="❌";
icon.style.color="red";
}

checkTask(taskId);
}

/* CHECK TASK COMPLETE */
function checkTask(taskId){

const steps = document.querySelectorAll("#"+taskId+" .step");
let done=true;

steps.forEach(s=>{
if(s.querySelector(".check").innerText!=="✔"){
done=false;
}
});

document.getElementById("btn-"+taskId).style.display =
done ? "block":"none";
}

/* COMPLETE */
function finish(name){
alert("🎉 "+name+" tamamlandı! Projeni kaydet.");
}

/* DRAG */
const popup=document.getElementById("eduPopup");
const header=document.getElementById("popupHeader");

let ox=0,oy=0,drag=false;

header.addEventListener("mousedown",(e)=>{
drag=true;
ox=e.clientX-popup.offsetLeft;
oy=e.clientY-popup.offsetTop;
});

document.addEventListener("mousemove",(e)=>{
if(!drag)return;

popup.style.left=(e.clientX-ox)+"px";
popup.style.top=(e.clientY-oy)+"px";
popup.style.right="auto";
});

document.addEventListener("mouseup",()=>drag=false);

</script>

</body>
</html>
