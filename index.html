<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Scratch Öğrenme Platformu</title>

<style>
body {
margin:0;
display:flex;
height:100vh;
font-family:Arial;
}

/* EDITOR */
#editor {
flex:3;
border:none;
}

/* PANEL */
#panel {
flex:1;
background:#f1f5f9;
padding:15px;
overflow:auto;
}

.task {
background:white;
padding:12px;
margin-bottom:10px;
border-radius:8px;
cursor:pointer;
}

button {
width:100%;
padding:10px;
background:#4d97ff;
color:white;
border:none;
border-radius:8px;
}
</style>

</head>

<body>

<!-- SADECE TEK EDITOR -->
<iframe
id="editor"
src="https://scratch-editor-green.vercel.app"
></iframe>

<!-- TEK PANEL -->
<div id="panel">

<h2>🎯 Görevler</h2>

<div class="task">🐱 Kedi yürüt</div>
<div class="task">🚀 Uzay oyunu</div>
<div class="task">🎮 Pong</div>

<button>💾 Kaydet</button>

</div>

</body>
</html>
