<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Scratch Eğitim Ortamı</title>

<script defer src="gui.js"></script>

<style>
html, body{
margin:0;
height:100%;
overflow:hidden;
}

/* SCRATCH */
#scratch-container{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
}

/* POPUP */
#eduPopup{
position:fixed;
top:20px;
right:20px;
width:340px;
height:450px;
background:white;
border:2px solid #4d97ff;
border-radius:10px;
z-index:99999;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
display:flex;
flex-direction:column;
overflow:hidden;
font-family:Arial;
}

/* TURUNCU DRAG HEADER */
#popupHeader{
background:#ffab19;
color:white;
padding:10px;
font-weight:bold;
cursor:move;
user-select:none;
}

/* CONTENT */
#popupContent{
flex:1;
padding:10px;
overflow:auto;
font-size:14px;
}

/* TASK ITEMS */
.taskItem{
display:flex;
align-items:center;
gap:8px;
margin-bottom:6px;
cursor:pointer;
}

.check{
font-weight:bold;
width:18px;
text-align:center;
}

/* BUTTON */
#popupBtn{
position:fixed;
top:20px;
right:380px;
z-index:99999;
padding:10px 14px;
background:#ffab19;
color:white;
border:none;
border-radius:20px;
cursor:pointer;
font-weight:bold;
}
</style>
</head>

<body>

<div id="scratch-container"></div>

<button id="popupBtn" onclick="togglePopup()">
📘 Görev
</button>

<div id="eduPopup">

<div id="popupHeader">
🎯 Görev Paneli (Sürükle Beni)
</div>

<div id="popupContent">

<h3>🐱 Görev 1</h3>

<div class="taskItem" onclick="toggleCheck(this)">
<span class="check">❌</span>
Sprite ekle
</div>

<div class="taskItem" onclick="toggleCheck(this)">
<span class="check">❌</span>
“move 10 steps” kullan
</div>

<div class="taskItem" onclick="toggleCheck(this)">
<span class="check">❌</span>
Green flag ile çalıştır
</div>

<hr>

<h3>🚀 Görev 2</h3>

<div class="taskItem" onclick="toggleCheck(this)">
<span class="check">❌</span>
Ok tuşları ile hareket ettir
</div>

<div class="taskItem" onclick="toggleCheck(this)">
<span class="check">❌</span>
Engel ekle
</div>

<hr>

<h3>🎮 Görev 3</h3>

<div class="taskItem" onclick="toggleCheck(this)">
<span class="check">❌</span>
Top ve paddle ekle
</div>

<div class="taskItem" onclick="toggleCheck(this)">
<span class="check">❌</span>
Çarpışma algıla
</div>

</div>
</div>

<script>

let visible = true;

/* popup aç/kapa */
function togglePopup(){
const popup = document.getElementById("eduPopup");

if(visible){
popup.style.display = "none";
visible = false;
}else{
popup.style.display = "flex";
visible = true;
}
}

/* CHECK TOGGLE */
function toggleCheck(el){
const icon = el.querySelector(".check");

if(icon.innerText === "❌"){
icon.innerText = "✔";
icon.style.color = "green";
}else{
icon.innerText = "❌";
icon.style.color = "red";
}
}

/* DRAG (sadece header) */
const popup = document.getElementById("eduPopup");
const header = document.getElementById("popupHeader");

let offsetX = 0;
let offsetY = 0;
let dragging = false;

header.addEventListener("mousedown",(e)=>{
dragging = true;
offsetX = e.clientX - popup.offsetLeft;
offsetY = e.clientY - popup.offsetTop;
});

document.addEventListener("mousemove",(e)=>{
if(!dragging) return;

popup.style.left = (e.clientX - offsetX) + "px";
popup.style.top = (e.clientY - offsetY) + "px";
popup.style.right = "auto";
});

document.addEventListener("mouseup",()=>{
dragging = false;
});

</script>

</body>
</html>
