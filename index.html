<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Scratch Eğitim Ortamı</title>

<script defer src="gui.js"></script>

<style>
html, body{
margin:0;
height:100%;
overflow:hidden;
}

/* SCRATCH FULL SCREEN */
#scratch-container{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
}

/* POPUP */
#eduPopup{
position:fixed;
top:20px;
right:20px;
width:340px;
height:450px;
background:white;
border:2px solid #4d97ff;
border-radius:10px;
z-index:99999;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
display:flex;
flex-direction:column;
overflow:hidden;
font-family:Arial;
}

/* HEADER (DRAG AREA) */
#popupHeader{
background:#4d97ff;
color:white;
padding:10px;
font-weight:bold;
cursor:move;
user-select:none;
}

/* CONTENT */
#popupContent{
flex:1;
padding:10px;
overflow:auto;
font-size:14px;
}

/* TASK BUTTONS */
.taskBtn{
background:#f1f5f9;
padding:8px;
margin-bottom:6px;
border-radius:6px;
cursor:pointer;
border:1px solid #ddd;
}

.taskBtn:hover{
background:#e2e8f0;
}

/* TOGGLE BUTTON */
#popupBtn{
position:fixed;
top:20px;
right:380px;
z-index:99999;
padding:10px 14px;
background:#ffab19;
color:white;
border:none;
border-radius:20px;
cursor:pointer;
font-weight:bold;
}
</style>
</head>

<body>

<!-- SCRATCH -->
<div id="scratch-container"></div>

<!-- TOGGLE -->
<button id="popupBtn" onclick="togglePopup()">
📘 Görev
</button>

<!-- POPUP -->
<div id="eduPopup">

<div id="popupHeader">
🎯 Görev Paneli (Sürükleyebilirsin)
</div>

<div id="popupContent">

<!-- GÖREV SEÇİMİ -->
<div class="taskBtn" onclick="showTask(1)">🐱 Görev 1</div>
<div class="taskBtn" onclick="showTask(2)">🚀 Görev 2</div>
<div class="taskBtn" onclick="showTask(3)">🎮 Görev 3</div>

<hr>

<!-- DİNAMİK İÇERİK -->
<div id="taskDetail">
Görev seçiniz...
</div>

</div>
</div>

<script>

/* POPUP GÖSTER / GİZLE */
let visible = true;

function togglePopup(){
const popup = document.getElementById("eduPopup");

if(visible){
popup.style.display = "none";
visible = false;
}else{
popup.style.display = "flex";
visible = true;
}
}

/* GÖREV İÇERİĞİ */
function showTask(id){

const box = document.getElementById("taskDetail");

if(id === 1){
box.innerHTML = `
<h3>🐱 Görev 1</h3>
<ol>
<li>Sprite ekle (Cat)</li>
<li>move 10 steps kullan</li>
<li>Green flag ile çalıştır</li>
</ol>
`;
}

if(id === 2){
box.innerHTML = `
<h3>🚀 Görev 2</h3>
<ol>
<li>Uzay gemisi ekle</li>
<li>Ok tuşları ile hareket ettir</li>
<li>Engel oluştur</li>
</ol>
`;
}

if(id === 3){
box.innerHTML = `
<h3>🎮 Görev 3</h3>
<ol>
<li>Top oluştur</li>
<li>Paddle ekle</li>
<li>Çarpışma algıla</li>
</ol>
`;
}

}

/* DRAG & DROP */
const popup = document.getElementById("eduPopup");
const header = document.getElementById("popupHeader");

let offsetX = 0;
let offsetY = 0;
let dragging = false;

header.addEventListener("mousedown", (e)=>{
dragging = true;
offsetX = e.clientX - popup.offsetLeft;
offsetY = e.clientY - popup.offsetTop;
});

document.addEventListener("mousemove", (e)=>{
if(!dragging) return;

popup.style.left = (e.clientX - offsetX) + "px";
popup.style.top = (e.clientY - offsetY) + "px";
popup.style.right = "auto";
});

document.addEventListener("mouseup", ()=>{
dragging = false;
});

</script>

</body>
</html>
